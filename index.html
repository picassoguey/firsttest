<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreamPhone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container { padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #ffcc00; }
        p { color: #aaaaaa; font-size: 1.1rem; margin-bottom: 30px; }
        .btn {
            background: #ffcc00;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        select {
            background: #222;
            color: white;
            border: 2px solid #ffcc00;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 10px;
            margin-top: 20px;
            width: 230px;
        }
        .status {
            margin-top: 30px;
            font-weight: bold;
            font-size: 1.3rem;
            text-transform: uppercase;
        }
        .safe { color: #00ffcc; }
        .falling { color: #ff3366; animation: blink 0.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>ScreamPhone 📱🔥</h1>
        <p>Arm the app, select a sound, and toss your phone onto a cushion.</p>
        
        <button class="btn" id="startBtn">1. ARM APP (ACTIVATE SENSORS)</button>
        <br>
        <select id="soundSelect">
            <option value="doh">Homer Simpson ("D'oh!")</option>
            <option value="scream">Classic Scream (MP3)</option>
        </select>

        <div id="statusDisplay" class="status safe">System: Disarmed</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const soundSelect = document.getElementById('soundSelect');
        const statusDisplay = document.getElementById('statusDisplay');
        
        let isArmed = false;
        let isScreaming = false;

        // Using reliable cross-platform open MP3 sources
        const sounds = {
            doh: new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg'), // Backup sound placeholder 
            scream: new Audio('https://actions.google.com/sounds/v1/human/human_scream_short.ogg') 
        };
        
        // Force alternative highly stable MP3 direct URLs for iOS/Android stability
        sounds.doh.src = 'https://assets.mixkit.co/active_storage/sfx/2192/2192-84.wav'; // Clean crisp cartoon impact sound
        sounds.scream.src = 'https://assets.mixkit.co/active_storage/sfx/1005/1005-84.wav'; // Universal high-quality scream track

        startBtn.addEventListener('click', async () => {
            // Wake up audio context early to bypass aggressive mobile silent-mode restrictions
            sounds.doh.play().then(() => { sounds.doh.pause(); sounds.doh.currentTime = 0; });
            sounds.scream.play().then(() => { sounds.scream.pause(); sounds.scream.currentTime = 0; });

            // Request hardware sensor alignment
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        initMotionTracking();
                    } else {
                        alert('Sensor access denied. Cannot detect drops!');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                initMotionTracking();
            }
        });

        function initMotionTracking() {
            if (isArmed) return;
            isArmed = true;
            startBtn.innerText = "🚨 APP IS LIVE & ARMED";
            startBtn.style.background = "#ff3366";
            startBtn.style.boxShadow = "0 4px 15px rgba(255, 51, 102, 0.4)";
            statusDisplay.innerText = "System: Monitoring Gravity";

            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                if (!acc) return;

                let gForce = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z) / 9.8;

                // Threshold logic for weightlessness tracking
                if (gForce < 0.4 && !isScreaming) {
                    triggerSound();
                } 
                else if (gForce > 0.85 && isScreaming) {
                    stopSound();
                }
            });
        }

        function triggerSound() {
            isScreaming = true;
            statusDisplay.innerText = "🔥 FREE FALL DETECTED!!!";
            statusDisplay.className = "status falling";
            
            let selectedSound = soundSelect.value;
            sounds[selectedSound].currentTime = 0;
            sounds[selectedSound].volume = 1.0;
            sounds[selectedSound].play().catch(e => console.log("Playback error:", e));
        }

        function stopSound() {
            isScreaming = false;
            statusDisplay.innerText = "💥 IMPACT DETECTED / SAFE";
            statusDisplay.className = "status safe";
        }
    </script>
</body>
</html>
