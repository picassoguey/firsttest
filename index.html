<script>
    const mainBtn = document.getElementById('mainBtn');
    const statusDisplay = document.getElementById('statusDisplay');
    const screamAudio = document.getElementById('screamAudio');

    let isArmed = false;
    let isScreaming = false;

    mainBtn.addEventListener('click', async () => {
        // FORCE AUDIO UNLOCK: We play and immediately pause. 
        // This tricks the phone's security sandbox into unlocking the audio stream.
        screamAudio.play();
        screamAudio.pause();
        screamAudio.currentTime = 0;

        // Request hardware sensor permission
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const permissionState = await DeviceMotionEvent.requestPermission();
                if (permissionState === 'granted') {
                    activateTracking();
                } else {
                    statusDisplay.innerText = "PERMISSION DENIED";
                }
            } catch (error) {
                statusDisplay.innerText = "ERROR LOADING HARDWARE";
            }
        } else {
            activateTracking(); // Android
        }
    });

    function activateTracking() {
        if (isArmed) return;
        isArmed = true;

        mainBtn.innerText = "🚨 SYSTEM LIVE (TOSS NOW)";
        mainBtn.className = "action-btn btn-armed";
        statusDisplay.innerText = "MONITORING FOR DROP...";

        window.addEventListener('devicemotion', (event) => {
            let acc = event.accelerationIncludingGravity;
            if (!acc) return;

            let x = acc.x || 0;
            let y = acc.y || 0;
            let z = acc.z || 0;
            
            let gForce = Math.sqrt(x * x + y * y + z * z) / 9.8;

            if (gForce < 0.4 && !isScreaming) {
                isScreaming = true;
                statusDisplay.innerText = "🔥 FREE FALL DETECTED !!!";
                statusDisplay.className = "value falling";
                
                // Force play
                screamAudio.currentTime = 0;
                let playPromise = screamAudio.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        // If it fails, alert the exact error to the screen so we can see it
                        statusDisplay.innerText = "AUDIO BLOCKED: " + error.message;
                    });
                }
            } 
            else if (gForce > 0.85 && isScreaming) {
                isScreaming = false;
                statusDisplay.innerText = "✅ STABILIZED";
                statusDisplay.className = "value";
                screamAudio.pause();
            }
        });
    }
</script>
